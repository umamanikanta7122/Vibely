{% extends 'base.html' %}

{% block content %}

<h2>Register</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    {% if form.errors %}
        <div style="color:red;">
            {{ form.errors }}
        </div>
    {% endif %}

    <button type="submit">Register</button>
</form>

{% endblock %}
