{% extends 'base.html' %}

{% block content %}
<h2>Login</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="login-actions">

    <button type="submit">
        Login
    </button>

    <a href="/register/" class="register-link">
       Don’t have an account? Register
    </a>

</div>
</form>



{% endblock %}
